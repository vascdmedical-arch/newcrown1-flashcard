<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a2e">
<title>NEW CROWN 1 単語カード</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  :root{
    --bg:#0f0f23;--bg2:#1a1a35;--bg3:#252545;
    --card-front:#1e2a5e;--card-back:#0d3b2e;
    --accent:#6c8fff;--accent2:#52d9a0;
    --warn:#ff7043;--ok:#4caf7d;
    --txt:#eef0ff;--txt2:#9aa3cc;--txt3:#6b74a0;
    --radius:20px;--shadow:0 8px 32px rgba(0,0,0,0.4);
  }
  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Helvetica Neue',sans-serif}
  #app{display:flex;flex-direction:column;height:100dvh;height:100vh;max-width:480px;margin:0 auto;padding:env(safe-area-inset-top,0) 0 env(safe-area-inset-bottom,0)}

  /* HEADER */
  .header{padding:14px 18px 10px;display:flex;align-items:center;gap:10px;flex-shrink:0}
  .header h1{font-size:15px;font-weight:700;letter-spacing:0.04em;color:var(--txt);flex:1}
  .header h1 span{color:var(--accent);font-size:11px;font-weight:500;display:block;letter-spacing:0.06em}
  .menu-btn{width:36px;height:36px;border-radius:12px;background:var(--bg3);border:none;color:var(--txt2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}

  /* STATS BAR */
  .stats-bar{display:flex;gap:8px;padding:0 18px 12px;flex-shrink:0}
  .stat-pill{flex:1;padding:8px 6px;border-radius:12px;text-align:center;background:var(--bg3)}
  .stat-pill .num{font-size:20px;font-weight:700;line-height:1}
  .stat-pill .lbl{font-size:10px;color:var(--txt3);margin-top:2px;letter-spacing:0.04em}
  .stat-pill.ok .num{color:var(--ok)}
  .stat-pill.ng .num{color:var(--warn)}
  .stat-pill.tot .num{color:var(--accent)}

  /* PROGRESS */
  .prog-wrap{padding:0 18px 14px;flex-shrink:0}
  .prog-track{height:4px;background:var(--bg3);border-radius:2px}
  .prog-fill{height:4px;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width 0.4s cubic-bezier(.4,0,.2,1)}

  /* FILTER ROW */
  .filter-row{display:flex;gap:8px;padding:0 18px 14px;flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .filter-row::-webkit-scrollbar{display:none}
  .filter-row select{-webkit-appearance:none;appearance:none;background:var(--bg3);border:1px solid var(--bg3);color:var(--txt);font-size:12px;padding:7px 12px;border-radius:10px;cursor:pointer;flex-shrink:0;font-family:inherit}

  /* CARD SCENE */
  .scene{flex:1;padding:0 18px;display:flex;align-items:center;justify-content:center;min-height:0;perspective:1200px}
  .card-wrap{width:100%;max-height:340px;height:calc(100vw * 0.65);max-width:420px;position:relative;transform-style:preserve-3d;transition:transform 0.55s cubic-bezier(.4,0,.2,1);cursor:pointer;user-select:none}
  .card-wrap.flipped{transform:rotateY(180deg)}
  .card-face{position:absolute;inset:0;border-radius:var(--radius);padding:28px 24px;display:flex;flex-direction:column;align-items:center;justify-content:center;backface-visibility:hidden;-webkit-backface-visibility:hidden;gap:12px}
  .card-face.front{background:linear-gradient(145deg,var(--card-front),#2d3a7a)}
  .card-face.back{background:linear-gradient(145deg,var(--card-back),#1a5c43);transform:rotateY(180deg)}
  .card-type{position:absolute;top:16px;left:18px;font-size:10px;letter-spacing:0.1em;color:rgba(255,255,255,0.4);text-transform:uppercase;font-weight:600}
  .card-badge{position:absolute;top:12px;right:14px;font-size:10px;padding:3px 8px;border-radius:8px;background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.7);font-weight:500}
  .card-jp{font-size:clamp(28px,8vw,44px);font-weight:700;text-align:center;color:#fff;line-height:1.2}
  .card-en{font-size:clamp(26px,7.5vw,40px);font-weight:700;text-align:center;color:#fff;line-height:1.2}
  .card-hint{font-size:12px;color:rgba(255,255,255,0.35);text-align:center;position:absolute;bottom:16px}
  .speak-btn{margin-top:4px;padding:8px 18px;border-radius:20px;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.85);font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:inherit;transition:background 0.15s}
  .speak-btn:active{background:rgba(255,255,255,0.22)}
  .speak-icon{width:16px;height:16px;fill:currentColor;flex-shrink:0}

  /* SWIPE HINT */
  .swipe-hint{font-size:11px;color:var(--txt3);text-align:center;padding:6px 0 8px;flex-shrink:0;letter-spacing:0.03em}

  /* RESULT BTNS */
  .result-row{display:flex;gap:10px;padding:0 18px 12px;flex-shrink:0}
  .result-btn{flex:1;padding:15px 10px;border-radius:16px;border:none;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:0.04em;transition:transform 0.12s,opacity 0.12s;-webkit-user-select:none}
  .result-btn:active{transform:scale(0.95)}
  .result-btn.ok{background:var(--ok);color:#fff}
  .result-btn.ng{background:var(--warn);color:#fff}
  .result-btn.flip-btn{background:var(--bg3);color:var(--txt2);font-size:14px}

  /* FLIP ROW */
  .flip-row{display:flex;gap:10px;padding:0 18px 12px;flex-shrink:0}
  .flip-big{flex:2;padding:15px 10px;border-radius:16px;border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:0.06em;transition:transform 0.12s;-webkit-user-select:none}
  .flip-big:active{transform:scale(0.95)}
  .skip-btn{flex:1;padding:15px 10px;border-radius:16px;border:1px solid var(--bg3);background:transparent;color:var(--txt3);font-size:14px;cursor:pointer;font-family:inherit;-webkit-user-select:none}
  .skip-btn:active{background:var(--bg3)}

  /* NAV */
  .nav-row{display:flex;align-items:center;justify-content:space-between;padding:4px 18px 14px;flex-shrink:0}
  .nav-btn{width:40px;height:40px;border-radius:12px;background:var(--bg3);border:none;color:var(--txt2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-user-select:none}
  .nav-btn:active{background:var(--bg2)}
  .nav-ctr{font-size:13px;color:var(--txt2);font-weight:500}

  /* DONE */
  .done-screen{display:none;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:24px;text-align:center;gap:16px}
  .done-screen.show{display:flex}
  .done-circle{width:120px;height:120px;border-radius:50%;background:var(--bg3);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto}
  .done-pct{font-size:36px;font-weight:700;color:var(--accent)}
  .done-lbl{font-size:11px;color:var(--txt3);letter-spacing:0.06em}
  .done-detail{font-size:14px;color:var(--txt2)}
  .done-h{font-size:22px;font-weight:700}
  .restart-btn{padding:16px 40px;border-radius:16px;background:var(--accent);border:none;color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:0.04em;margin-top:8px}
  .restart-btn:active{opacity:0.85}

  /* DRAWER */
  .drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:100;display:none;opacity:0;transition:opacity 0.25s}
  .drawer-overlay.open{display:block;opacity:1}
  .drawer{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;background:var(--bg2);border-radius:24px 24px 0 0;padding:20px 20px calc(20px + env(safe-area-inset-bottom,0));z-index:101;transform:translateY(100%);transition:transform 0.3s cubic-bezier(.4,0,.2,1)}
  .drawer.open{transform:translateY(0)}
  .drawer-handle{width:36px;height:4px;border-radius:2px;background:var(--bg3);margin:0 auto 20px}
  .drawer-title{font-size:13px;color:var(--txt3);letter-spacing:0.06em;margin-bottom:12px;text-transform:uppercase}
  .drawer-section{margin-bottom:20px}
  .drawer-label{font-size:12px;color:var(--txt3);margin-bottom:8px;letter-spacing:0.04em}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{padding:8px 14px;border-radius:20px;font-size:13px;cursor:pointer;border:1px solid var(--bg3);background:var(--bg3);color:var(--txt2);transition:all 0.15s;font-family:inherit}
  .chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .chip:active{opacity:0.75}
  .notice{font-size:11px;color:var(--txt3);text-align:center;padding:0 18px 8px;line-height:1.5;flex-shrink:0}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <h1>NEW CROWN 1<span>英単語カード</span></h1>
    <button class="menu-btn" onclick="openDrawer()">☰</button>
  </div>

  <div class="stats-bar">
    <div class="stat-pill ok"><div class="num" id="s-ok">0</div><div class="lbl">正解</div></div>
    <div class="stat-pill ng"><div class="num" id="s-ng">0</div><div class="lbl">不正解</div></div>
    <div class="stat-pill tot"><div class="num" id="s-tot">0/0</div><div class="lbl">進捗</div></div>
  </div>

  <div class="prog-wrap"><div class="prog-track"><div class="prog-fill" id="prog" style="width:0%"></div></div></div>

  <div class="scene" id="scene">
    <div class="card-wrap" id="card-wrap" onclick="flipCard()">
      <div class="card-face front">
        <span class="card-type">日本語</span>
        <span class="card-badge" id="badge-f">Starter</span>
        <div class="card-jp" id="card-jp">-</div>
        <div class="card-hint">タップしてめくる</div>
      </div>
      <div class="card-face back">
        <span class="card-type">英語</span>
        <span class="card-badge" id="badge-b">Starter</span>
        <div class="card-en" id="card-en">-</div>
        <button class="speak-btn" onclick="speakWord(event)">
          <svg class="speak-icon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
          発音を聞く
        </button>
        <div class="card-hint">正解・不正解を選んでください</div>
      </div>
    </div>
  </div>

  <div class="swipe-hint" id="swipe-hint">← スワイプで移動 →</div>

  <div class="flip-row" id="row-front">
    <button class="flip-big" onclick="flipCard()">めくる ↺</button>
    <button class="skip-btn" onclick="skipCard()">スキップ</button>
  </div>
  <div class="result-row" id="row-back" style="display:none">
    <button class="result-btn ng" onclick="mark(false)">✗ 不正解</button>
    <button class="result-btn ok" onclick="mark(true)">✓ 正解</button>
  </div>

  <div class="nav-row">
    <button class="nav-btn" onclick="prevCard()">←</button>
    <span class="nav-ctr" id="nav-ctr">1 / 1</span>
    <button class="nav-btn" onclick="nextCard()">→</button>
  </div>

  <p class="notice">発音はブラウザのTTS機能を使用。ブラウザの言語設定によっては英語音声が利用できない場合があります。</p>
</div>

<div class="done-screen" id="done-screen">
  <div class="done-h">セット完了！</div>
  <div class="done-circle">
    <div class="done-pct" id="done-pct">0%</div>
    <div class="done-lbl">正解率</div>
  </div>
  <div class="done-detail" id="done-detail"></div>
  <button class="restart-btn" onclick="restart()">もう一度挑戦</button>
</div>

<div class="drawer-overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-section">
    <div class="drawer-title">レッスン選択</div>
    <div class="chips" id="lesson-chips"></div>
  </div>
  <div class="drawer-section">
    <div class="drawer-title">順序</div>
    <div class="chips">
      <button class="chip active" id="ord-order" onclick="setOrder('order',this)">教科書順</button>
      <button class="chip" id="ord-random" onclick="setOrder('random',this)">ランダム</button>
      <button class="chip" id="ord-wrong" onclick="setOrder('wrong',this)">不正解のみ</button>
    </div>
  </div>
  <button class="restart-btn" style="width:100%;margin-top:4px" onclick="closeDrawer();restart()">このセットで開始</button>
</div>

const LESSONS=["全レッスン",...Object.keys(WORDS)];
let deck=[],idx=0,flipped=false,results={},curLesson="全レッスン",curOrder="order";
let touchStartX=0,touchStartY=0;

function buildDeck(){
  let pool=[];
  if(curLesson==="全レッスン"){Object.keys(WORDS).forEach(l=>WORDS[l].forEach(w=>pool.push({jp:w[0],en:w[1],lesson:l})));}
  else{(WORDS[curLesson]||[]).forEach(w=>pool.push({jp:w[0],en:w[1],lesson:curLesson}));}
  if(curOrder==="wrong"){pool=pool.filter(w=>results[w.en]===false);if(!pool.length){alert("不正解の単語がありません");return;}}
  if(curOrder==="random"){for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}}
  deck=pool;idx=0;showCard();
}

function showCard(){
  flipped=false;
  document.getElementById("card-wrap").classList.remove("flipped");
  document.getElementById("row-front").style.display="flex";
  document.getElementById("row-back").style.display="none";
  document.getElementById("done-screen").classList.remove("show");
  document.getElementById("app").style.display="flex";
  if(!deck.length)return;
  if(idx>=deck.length){showDone();return;}
  const w=deck[idx];
  document.getElementById("card-jp").textContent=w.jp;
  document.getElementById("card-en").textContent=w.en;
  document.getElementById("badge-f").textContent=w.lesson;
  document.getElementById("badge-b").textContent=w.lesson;
  document.getElementById("nav-ctr").textContent=(idx+1)+" / "+deck.length;
  document.getElementById("prog").style.width=(deck.length>1?idx/(deck.length-1)*100:0)+"%";
  updateStats();
}

function flipCard(){
  flipped=!flipped;
  document.getElementById("card-wrap").classList.toggle("flipped",flipped);
  document.getElementById("row-front").style.display=flipped?"none":"flex";
  document.getElementById("row-back").style.display=flipped?"flex":"none";
}

function mark(ok){
  results[deck[idx].en]=ok;updateStats();idx++;
  if(idx>=deck.length){setTimeout(showDone,300);}else{setTimeout(showCard,200);}
}

function skipCard(){idx++;if(idx>=deck.length){showDone();return;}showCard();}
function prevCard(){if(idx>0){idx--;showCard();}}
function nextCard(){if(idx<deck.length-1){idx++;showCard();}}

function updateStats(){
  const ok=Object.values(results).filter(v=>v===true).length;
  const ng=Object.values(results).filter(v=>v===false).length;
  document.getElementById("s-ok").textContent=ok;
  document.getElementById("s-ng").textContent=ng;
  document.getElementById("s-tot").textContent=(ok+ng)+"/"+deck.length;
}

function speakWord(e){
  e.stopPropagation();
  const w=deck[idx]?.en;if(!w)return;
  if("speechSynthesis" in window){window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(w);u.lang="en-US";u.rate=0.85;window.speechSynthesis.speak(u);}
}

function showDone(){
  document.getElementById("app").style.display="none";
  const ds=document.getElementById("done-screen");ds.classList.add("show");
  const ok=Object.values(results).filter(v=>v===true).length;
  const tot=Object.values(results).length;
  document.getElementById("done-pct").textContent=(tot>0?Math.round(ok/tot*100):0)+"%";
  document.getElementById("done-detail").textContent="正解 "+ok+" 語 / 全 "+tot+" 語";
}

function restart(){results={};buildDeck();}

function openDrawer(){
  document.getElementById("overlay").classList.add("open");
  document.getElementById("drawer").classList.add("open");
}
function closeDrawer(){
  document.getElementById("overlay").classList.remove("open");
  document.getElementById("drawer").classList.remove("open");
}

function setOrder(o,el){
  curOrder=o;
  document.querySelectorAll("#drawer .chips .chip[id^=ord-]").forEach(c=>c.classList.remove("active"));
  el.classList.add("active");
}

function initChips(){
  const c=document.getElementById("lesson-chips");
  LESSONS.forEach(l=>{
    const b=document.createElement("button");
    b.className="chip"+(l==="全レッスン"?" active":"");
    b.textContent=l;
    b.onclick=()=>{curLesson=l;c.querySelectorAll(".chip").forEach(x=>x.classList.remove("active"));b.classList.add("active");};
    c.appendChild(b);
  });
}

// Swipe
const scene=document.getElementById("scene");
scene.addEventListener("touchstart",e=>{touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY;},{passive:true});
scene.addEventListener("touchend",e=>{
  const dx=e.changedTouches[0].clientX-touchStartX;
  const dy=e.changedTouches[0].clientY-touchStartY;
  if(Math.abs(dx)>Math.abs(dy)*1.5&&Math.abs(dx)>40){
    if(dx<0)nextCard();else prevCard();
  }
},{passive:true});

initChips();
buildDeck();
</script>
